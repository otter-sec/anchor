name: Downstream Builds

on:
  push:
    branches:
      - anchor-next
    paths-ignore:
      - "docs/**"
  # FIXME: Remove this before final merge; downstream builds should only run
  # on pushes to anchor-next once the workflow has been validated.
  pull_request:
    paths-ignore:
      - "docs/**"

env:
  SOLANA_VERSION: "3.1.10"

jobs:
  downstream-matrix:
    name: Build downstream matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.repos.outputs.matrix }}
    steps:
      - name: Checkout anchor-community
        uses: actions/checkout@v3
        with:
          repository: otter-sec/anchor-community
          path: anchor-community

      - name: Build matrix from repos.json
        id: repos
        run: |
          matrix="$(jq -c '{include: [.[] | {
            name,
            source,
            repository: (.source | sub("^https://github.com/"; "") | sub("\\.git$"; "")),
            commit,
            directory,
            build_command
          }]}' anchor-community/repos.json)"

          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  anchor-build:
    needs: downstream-matrix
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.downstream-matrix.outputs.matrix) }}

    steps:
      - name: Checkout ${{ matrix.source }}
        uses: actions/checkout@v3
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.commit }}
          path: ${{ matrix.directory }}
          submodules: recursive

      - name: Checkout latest AVM from otter-sec/anchor#4534
        uses: actions/checkout@v3
        with:
          repository: otter-sec/anchor
          ref: refs/pull/4534/head
          path: avm-source

      - name: Show AVM checkout
        run: git -C avm-source rev-parse HEAD

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config build-essential libudev-dev

      - uses: actions/cache@v4
        name: Cache Solana Tool Suite
        id: cache-solana
        with:
          path: |
            ~/.cache/solana/
            ~/.local/share/solana/
          key: downstream-solana-${{ runner.os }}-v0000-${{ env.SOLANA_VERSION }}

      - uses: nick-fields/retry@v2
        if: steps.cache-solana.outputs.cache-hit != 'true'
        with:
          retry_wait_seconds: 300
          timeout_minutes: 2
          max_attempts: 10
          retry_on: error
          shell: bash
          command: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Activate requested Solana release
        run: |
          set -euo pipefail

          install_dir="$HOME/.local/share/solana/install"
          release_dir="$install_dir/releases/$SOLANA_VERSION/solana-release"

          if [[ ! -x "$release_dir/bin/solana" ]]; then
            sh -c "$(curl -sSfL "https://release.anza.xyz/v$SOLANA_VERSION/install")"
          else
            ln -sfn "$release_dir" "$install_dir/active_release"
          fi

          echo "$install_dir/active_release/bin" >> "$GITHUB_PATH"
          actual="$("$install_dir/active_release/bin/solana" --version)"
          echo "$actual"
          case "$actual" in
            "solana-cli $SOLANA_VERSION"*) ;;
            *)
              echo "Expected Solana $SOLANA_VERSION, got: $actual" >&2
              exit 1
              ;;
          esac
        shell: bash

      - run: solana-keygen new --no-bip39-passphrase
      - run: solana config set --url localhost

      - uses: actions/cache@v4
        name: Cache AVM target
        with:
          path: avm-target/
          key: cargo-target-${{ runner.os }}-downstream-avm-4534-${{ hashFiles('avm-source/Cargo.lock', 'avm-source/avm/src/**') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-downstream-avm-4534-

      - uses: actions/cache@v4
        name: Cache ${{ matrix.name }} Cargo home
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-${{ runner.os }}-downstream-${{ matrix.directory }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.directory)) }}
          restore-keys: |
            cargo-home-${{ runner.os }}-downstream-${{ matrix.directory }}-

      - name: Install AVM
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/avm-target
        run: |
          cargo install --path avm-source/avm --locked --force
          avm --version
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        name: Cache ${{ matrix.name }} target
        with:
          path: ${{ matrix.directory }}/target/
          key: cargo-target-${{ runner.os }}-downstream-${{ matrix.directory }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.directory)) }}-${{ github.run_id }}
          restore-keys: |
            cargo-target-${{ runner.os }}-downstream-${{ matrix.directory }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.directory)) }}-
            cargo-target-${{ runner.os }}-downstream-${{ matrix.directory }}-

      - name: Build ${{ matrix.repository }}
        working-directory: ${{ matrix.directory }}
        env:
          BUILD_COMMAND: ${{ matrix.build_command }}
        run: |
          # PR #4534's AVM resolves the Anchor version from the downstream
          # project and prompts before installing a missing CLI. Run under a
          # pseudo-terminal and answer yes so CI exercises that install/download
          # path instead of relying on a pre-uploaded anchor binary.
          printf 'y\n' | script -qec "$BUILD_COMMAND" /dev/null
