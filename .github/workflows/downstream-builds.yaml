name: Downstream Builds

on:
  push:
    branches:
      - anchor-next
    paths-ignore:
      - "docs/**"

env:
  SOLANA_VERSION: "3.1.10"

jobs:
  setup-anchor-cli:
    name: Setup Anchor CLI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout Anchor
        uses: actions/checkout@v3

      - uses: ./.github/actions/setup/

      - uses: actions/cache@v4
        name: Cache Cargo home
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-${{ runner.os }}-downstream-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-home-${{ runner.os }}-downstream-

      - uses: actions/cache@v4
        name: Cache Anchor target
        with:
          path: ./target/
          key: cargo-target-${{ runner.os }}-downstream-anchor-${{ hashFiles('**/Cargo.lock') }}-${{ github.ref_name }}
          restore-keys: |
            cargo-target-${{ runner.os }}-downstream-anchor-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-downstream-anchor-

      - name: Install Anchor CLI
        run: cargo install --path cli --locked --debug --force --target-dir ./target

      - run: chmod +x ~/.cargo/bin/anchor

      - uses: actions/upload-artifact@v4
        with:
          name: anchor-binary-downstream
          path: ~/.cargo/bin/anchor
          retention-days: 1

  anchor-build:
    needs: setup-anchor-cli
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: helium-program-library
            repository: helium/helium-program-library
            build_command: TESTING=true anchor build

    steps:
      - name: Checkout ${{ matrix.repository }}
        uses: actions/checkout@v3
        with:
          repository: ${{ matrix.repository }}
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config build-essential libudev-dev

      - uses: actions/cache@v4
        name: Cache Solana Tool Suite
        id: cache-solana
        with:
          path: |
            ~/.cache/solana/
            ~/.local/share/solana/
          key: solana-${{ runner.os }}-v0000-${{ env.SOLANA_VERSION }}

      - uses: nick-fields/retry@v2
        if: steps.cache-solana.outputs.cache-hit != 'true'
        with:
          retry_wait_seconds: 300
          timeout_minutes: 2
          max_attempts: 10
          retry_on: error
          shell: bash
          command: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - run: echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - run: solana-keygen new --no-bip39-passphrase
      - run: solana config set --url localhost

      - uses: actions/download-artifact@v4
        with:
          name: anchor-binary-downstream
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/anchor

      - uses: actions/cache@v4
        name: Cache ${{ matrix.name }} Cargo home
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-home-${{ runner.os }}-downstream-${{ matrix.name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-home-${{ runner.os }}-downstream-${{ matrix.name }}-

      - uses: actions/cache@v4
        name: Cache ${{ matrix.name }} target
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-downstream-${{ matrix.name }}-${{ hashFiles('Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            cargo-target-${{ runner.os }}-downstream-${{ matrix.name }}-${{ hashFiles('Cargo.lock') }}-
            cargo-target-${{ runner.os }}-downstream-${{ matrix.name }}-

      - name: Build ${{ matrix.repository }}
        run: ${{ matrix.build_command }}
